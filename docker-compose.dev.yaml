services:

  cert-gen:
    image: alpine:latest
    container_name: codebase-cert-gen
    volumes:
      - .:/script
      - certs-data:/certs
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache openssl bash && 
      chmod +x /script/entrypoint.sh && 
      /bin/bash /script/entrypoint.sh
      "
      
  postgres:
    image: postgres:17
    container_name: codebase-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - codebase-net

  redis:
    image: redis:7
    container_name: codebase-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - codebase-net

  api:
    build:
      context: .
      dockerfile: Codebase/Dockerfile
    container_name: codebase-api
    restart: always
    depends_on:
      cert-gen:
        condition: service_completed_successfully # Đợi tạo cert xong mới chạy API
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      Redis__ConnectionString: ${REDIS_HOST}:${REDIS_PORT}
      ASPNETCORE_URLS: "https://+;http://+"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: "password"
    x-develop:
      watch:
        - action: rebuild
          path: .
          target: /src
          ignore:
            - bin/
            - obj/
    ports:
      - "5217:5217" # Map cổng HTTP
      - "7226:7226" # Map cổng HTTPS
    volumes:
      - certs-data:/https:ro # Mount cert vào API (chế độ chỉ đọc)
    networks:
      - codebase-net

networks:
  codebase-net:
    
volumes:
  certs-data: